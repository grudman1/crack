<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fffdf7" />
    <meta name="description" content="Crack — name a famous person for each pair of initials." />
    <title>Crack</title>

    <!-- Favicons. SVG is the source of truth; the PNGs are generated
         from it via `npm run gen-rasters` and checked in. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph (iMessage, Slack, Discord, FB) -->
    <meta property="og:title" content="Crack — the name game" />
    <meta property="og:description" content="Name a famous person for each pair of initials." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://crack-black.vercel.app" />
    <meta property="og:image" content="https://crack-black.vercel.app/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crack — the name game" />
    <meta name="twitter:description" content="Name a famous person for each pair of initials." />
    <meta name="twitter:image" content="https://crack-black.vercel.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
