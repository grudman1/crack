<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#fffdf7"/>
  <!-- Crack mark, 200×200, centered horizontally, vertically pushed up -->
  <g transform="translate(500 100)">
    <rect x="0.5" y="0.5" width="199" height="199" rx="22" fill="#fffdf7" stroke="#e8e6dc" stroke-width="1"/>
    <g font-family="Georgia, 'Times New Roman', serif" font-weight="700" text-anchor="middle">
      <text x="100" y="73" font-size="34" fill="#121212">A · T</text>
      <text x="100" y="118" font-size="34" fill="#e8743b">B · H</text>
      <text x="100" y="163" font-size="34" fill="#121212">C · E</text>
    </g>
  </g>
  <text x="600" y="430" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700"
        font-size="120" fill="#121212">Crack</text>
  <text x="600" y="500" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-weight="400"
        font-size="32" fill="#121212">Name a famous person for each pair of initials.</text>
  <text x="600" y="585" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-weight="400"
        font-size="20" fill="#6e6e6e">crack-black.vercel.app</text>
</svg>
